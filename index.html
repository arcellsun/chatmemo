<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>메모</title>
<english rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">
<!-- iOS 하플영 아저 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="무���">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- Android Chrome -->
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  /* Gemini Light */
  --c-bg:        #f8f9fa;
  --c-bg2:       #ffffff;
  --c-bg3:       #f1f3f4;
  --c-fill:      rgba(0,0,0,0.05);
  --c-fill2:     rgba(0,0,0,0.03);
  --c-sep:       rgba(0,0,0,0.08);
  --c-sep2:      rgba(0,0,0,0.04);

  --c-label:     #1f1f1f;
  --c-label2:    rgba(31,31,31,0.6);
  --c-label3:    rgba(31,31,31,0.38);
  --c-label4:    rgba(31,31,31,0.18);

  --c-blue:      #1a73e8;
  --c-blue-bg:   rgba(26,115,232,0.08);
  --c-green:     #1e8e3e;
  --c-red:       #d93025;
  --c-orange:    #f29900;
  --c-purple:    #7c4dff;
  --c-teal:      #129eaf;

  --c-bubble-in: #f1f3f4;
  --c-bubble-out:#e8f0fe;

  --r-card:  12px;
  --r-sm:    8px;
  --r-full:  999px;
  --ease:    cubic-bezier(.4,0,.2,1);
  --t:       200ms;

  /* Gemini 전용 */
  --gem-grad:         linear-gradient(135deg, #4285f4 0%, #9c27b0 50%, #e91e63 100%);
  --gem-accent:       #4285f4;
  --gem-accent-light: rgba(66,133,244,0.1);
  --gem-accent-glow:  rgba(66,133,244,0.2);
  --gem-user-bg:      #e8f0fe;
  --gem-user-color:   #1a73e8;
}

[data-theme="dark"] {
  /* Gemini Dark */
  --c-bg:        #131314;
  --c-bg2:       #1e1f20;
  --c-bg3:       #282a2c;
  --c-fill:      rgba(255,255,255,0.07);
  --c-fill2:     rgba(255,255,255,0.04);
  --c-sep:       rgba(255,255,255,0.08);
  --c-sep2:      rgba(255,255,255,0.05);

  --c-label:     #e3e3e3;
  --c-label2:    rgba(227,227,227,0.6);
  --c-label3:    rgba(227,227,227,0.36);
  --c-label4:    rgba(227,227,227,0.18);

  --c-blue:      #8ab4f8;
  --c-blue-bg:   rgba(138,180,248,0.12);
  --c-green:     #81c995;
  --c-red:       #f28b82;
  --c-orange:    #fdd663;
  --c-purple:    #c58af9;
  --c-teal:      #78d9ec;

  --c-bubble-in: transparent;
  --c-bubble-out:#28282a;

  /* Gemini Dark 전용 */
  --gem-grad:         linear-gradient(135deg, #8ab4f8 0%, #c58af9 50%, #f28b82 100%);
  --gem-accent:       #8ab4f8;
  --gem-accent-light: rgba(138,180,248,0.12);
  --gem-accent-glow:  rgba(138,180,248,0.2);
  --gem-user-bg:      #28282a;
  --gem-user-color:   #8ab4f8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Google Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', system-ui, sans-serif;
  background: var(--c-bg);
  color: var(--c-label);
  -webkit-font-smoothing: antialiased;
  transition: background var(--t) var(--ease), color var(--t) var(--ease);
}
button { cursor: pointer; border: none; background: none; font-family: inherit; -webkit-tap-highlight-color: transparent; }
input, textarea { font-family: inherit; outline: none; border: none; background: none; }
a { text-decoration: none; }

/* ── App Shell ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 460px;
  margin: 0 auto;
  background: var(--c-bg);
  position: relative;
  overflow: hidden;
}

/* ── Header ── */
.app-header {
  background: var(--c-bg2);
  border-bottom: 1px solid var(--c-sep);
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 20;
}
.header-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  background: var(--gem-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-actions { display: flex; gap: 4px; }
.hdr-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  color: var(--c-label3);
  transition: background var(--t) var(--ease), color var(--t) var(--ease);
}
.hdr-btn:hover { background: var(--c-fill); color: var(--c-label2); }
.hdr-btn:active { background: var(--c-fill); }

/* ── Tab Content ── */
.tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
.tab-content.active { display: flex; }

/* ── Bottom Tab Bar (Gemini style) ── */
.tab-bar {
  display: flex;
  background: var(--c-bg2);
  border-top: 1px solid var(--c-sep);
  padding: 8px 8px max(8px, env(safe-area-inset-bottom));
  flex-shrink: 0;
  z-index: 20;
  gap: 4px;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 4px;
  border-radius: var(--r-full);
  color: var(--c-label3);
  transition: color var(--t) var(--ease), background var(--t) var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.active {
  color: var(--gem-accent);
  background: var(--gem-accent-light);
}
.tab-icon-wrap {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
}
.tab-icon-svg {
  width: 20px; height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.7;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: stroke var(--t) var(--ease);
}
.tab-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1px;
}

/* ════════════════════════════════
   CHAT TAB
════════════════════════════════ */
#chat-tab { background: var(--c-bg); }

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scroll-behavior: smooth;
}

/* Message grouping */
.msg { display: flex; flex-direction: column; margin-bottom: 2px; }
.msg.user { align-items: flex-end; }
.msg.bot  { align-items: flex-start; }

/* Gemini-style message bubbles */
.msg-bubble {
  max-width: 82%;
  padding: 10px 16px;
  font-size: 14.5px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
  animation: popIn .18s var(--ease);
}
@keyframes popIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* 유저 메시지 - 깔끔한 pill 모양 */
.msg.user .msg-bubble {
  background: var(--gem-user-bg);
  color: var(--c-label);
  border-radius: 20px 20px 4px 20px;
  font-size: 14.5px;
}
/* AI 메시지 - 버블 없이 깔끔하게 */
.msg.bot .msg-bubble {
  background: transparent;
  color: var(--c-label);
  border-radius: 0;
  padding: 4px 4px 4px 44px;
  position: relative;
  max-width: 100%;
  font-size: 14.5px;
}
/* AI 아바타 */
.msg.bot .msg-bubble::before {
  content: '';
  position: absolute;
  left: 0; top: 2px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--gem-grad);
  flex-shrink: 0;
}
.msg.bot { align-items: flex-start; width: 100%; }
.msg-time {
  font-size: 11px;
  color: var(--c-label3);
  margin: 3px 4px 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* Save confirm card */
.msg-card {
  max-width: 78%;
  margin-top: 4px;
  background: var(--c-bg2);
  border-radius: 12px;
  padding: 10px 13px;
  border: 1px solid var(--c-sep2);
  animation: popIn .2s var(--ease);
}
.msg-card .card-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 5px;
  line-height: 1.3;
}
.msg-card .card-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

/* Chat Input Area */
.chat-input-area {
  background: var(--c-bg);
  padding: 10px 16px 14px;
  flex-shrink: 0;
}
.quick-tags {
  display: flex;
  gap: 5px;
  margin-bottom: 7px;
  overflow-x: auto;
  scrollbar-width: none;
}
.quick-tags::-webkit-scrollbar { display: none; }
.quick-tag-btn {
  padding: 5px 13px;
  border-radius: var(--r-full);
  background: var(--c-bg2);
  border: 1px solid var(--c-sep);
  font-size: 12px;
  font-weight: 500;
  color: var(--c-label2);
  white-space: nowrap;
  transition: background var(--t) var(--ease), color var(--t) var(--ease), border-color var(--t) var(--ease);
  flex-shrink: 0;
}
.quick-tag-btn:active {
  background: var(--gem-accent-light);
  color: var(--gem-accent);
  border-color: var(--gem-accent);
}

/* Mode toggle + API dot */
.input-meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}
.mode-toggle {
  display: flex;
  background: var(--c-fill);
  border-radius: var(--r-full);
  padding: 2px;
  gap: 1px;
}
.mode-btn {
  padding: 4px 11px;
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 500;
  color: var(--c-label2);
  transition: background var(--t) var(--ease), color var(--t) var(--ease);
}
.mode-btn.active {
  background: var(--gem-accent);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 1px 6px var(--gem-accent-glow);
}
.api-status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--c-red);
  flex-shrink: 0;
  transition: background var(--t) var(--ease);
}
.api-status-dot.connected { background: var(--c-green); }

/* Input row - Gemini pill style */
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--c-bg2);
  border: 1.5px solid var(--c-sep);
  border-radius: 26px;
  padding: 10px 10px 10px 20px;
  transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.input-row:focus-within {
  border-color: transparent;
  box-shadow: 0 0 0 2px var(--gem-accent), 0 2px 12px rgba(0,0,0,0.1);
}
#chat-input {
  flex: 1;
  font-size: 15px;
  color: var(--c-label);
  line-height: 1.5;
  resize: none;
  max-height: 120px;
  min-height: 24px;
  overflow-y: auto;
  caret-color: var(--gem-accent);
  font-family: inherit;
}
#chat-input::placeholder { color: var(--c-label3); }
.send-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gem-grad);
  color: #fff;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity var(--t) var(--ease), transform var(--t) var(--ease);
}
.send-btn:active { opacity: 0.8; transform: scale(0.92); }

/* URL preview */
.url-preview {
  max-width: 78%;
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--c-bg2);
  border: 1px solid var(--c-sep2);
  border-radius: 10px;
  padding: 7px 10px;
  color: var(--c-blue);
  font-size: 12px;
  transition: opacity var(--t) var(--ease);
  word-break: break-all;
}
.url-preview:active { opacity: 0.7; }

/* Typing bubble */
.typing-bubble {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 8px 0;
  background: transparent;
  width: fit-content;
  margin-left: 44px;
}
.typing-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gem-accent);
  animation: tdot 1.1s ease-in-out infinite;
  opacity: 0.5;
}
.typing-dot:nth-child(2) { animation-delay: .15s; }
.typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes tdot {
  0%,80%,100% { transform: scale(.7); opacity:.5; }
  40% { transform: scale(1); opacity:1; }
}

/* Stream cursor */
.stream-cursor::after {
  content: '▍';
  animation: blink .65s infinite;
  background: var(--gem-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 13px;
}
@keyframes blink { 50% { opacity:0; } }

/* AI badge */
.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--gem-accent);
  color: #fff;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .2px;
  font-family: 'Courier New', monospace;
}

/* AI result cards */
.ai-result-card {
  max-width: 78%;
  margin-top: 4px;
  background: var(--c-bg2);
  border: 1px solid var(--c-sep2);
  border-radius: 12px;
  overflow: hidden;
  animation: popIn .2s var(--ease);
}
.ai-result-title {
  padding: 9px 12px 7px;
  font-size: 11px;
  font-weight: 700;
  color: var(--c-label2);
  letter-spacing: .3px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--c-sep2);
}
.ai-result-memo {
  padding: 9px 12px;
  border-bottom: 1px solid var(--c-sep2);
  cursor: pointer;
  transition: background var(--t) var(--ease);
}
.ai-result-memo:last-child { border-bottom: none; }
.ai-result-memo:active { background: var(--c-fill); }
.ai-result-memo-cat {
  font-size: 10px;
  font-weight: 600;
  color: var(--c-label3);
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: .3px;
}
.ai-result-memo-text { font-size: 13px; color: var(--c-label); line-height: 1.4; }

/* ════════════════════════════════
   CALENDAR TAB
════════════════════════════════ */
#calendar-tab { background: var(--c-bg2); }

.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--c-sep);
  flex-shrink: 0;
}
.cal-month-nav {
  display: flex;
  align-items: center;
  gap: 14px;
}
.cal-arrow {
  width: 26px; height: 26px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  color: var(--gem-accent);
  font-size: 16px;
  transition: background var(--t) var(--ease);
}
.cal-arrow:active { background: var(--c-fill); }
.cal-month-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -.4px;
  min-width: 80px;
  text-align: center;
}
.cal-today-pill {
  padding: 4px 12px;
  border-radius: 5px;
  background: var(--gem-accent-light);
  color: var(--gem-accent);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(66,133,244,0.2);
  transition: opacity var(--t) var(--ease);
}
.cal-today-pill:active { opacity: .7; }

.cal-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 8px 12px 2px;
  border-bottom: 1px solid var(--c-sep2);
  flex-shrink: 0;
}
.cal-weekday {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--c-label3);
  letter-spacing: .3px;
  padding: 2px 0;
}
.cal-weekday:first-child { color: var(--c-red); }
.cal-weekday:last-child  { color: var(--c-blue); }

.cal-grid-scroll { flex: 1; overflow-y: auto; padding: 6px 12px; }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
}
.cal-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px 6px;
  border-radius: 10px;
  cursor: pointer;
  min-height: 50px;
  transition: background var(--t) var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.cal-day:active { background: var(--c-fill); }
.cal-day.selected { background: var(--gem-accent-light); }
.day-num {
  font-size: 15px;
  font-weight: 400;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  line-height: 1;
  transition: background var(--t) var(--ease), color var(--t) var(--ease);
}
.cal-day.today .day-num {
  background: var(--gem-accent);
  color: #fff !important;
  font-weight: 700;
  box-shadow: 0 2px 8px var(--gem-accent-glow);
}
.cal-day.other-month .day-num { color: var(--c-label4) !important; }
.cal-day:nth-child(7n+1) .day-num { color: var(--c-red); }
.cal-day:nth-child(7n)   .day-num { color: var(--c-blue); }

.day-dots { display: flex; gap: 3px; justify-content: center; margin-top: 3px; }
.day-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gem-accent);
}
.day-dot.red { background: var(--c-red); }

/* Events panel */
.cal-events-panel {
  flex-shrink: 0;
  border-top: 1px solid var(--c-sep);
  max-height: 200px;
  overflow-y: auto;
  background: var(--c-bg);
}
.cal-events-header {
  padding: 9px 16px 6px;
  font-size: 12px;
  font-weight: 700;
  color: var(--c-label3);
  text-transform: uppercase;
  letter-spacing: .4px;
  position: sticky; top: 0;
  background: var(--c-bg);
  border-bottom: 1px solid var(--c-sep2);
}
.cal-event-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--c-sep2);
  cursor: pointer;
  transition: background var(--t) var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.cal-event-item:last-child { border-bottom: none; }
.cal-event-item:active { background: var(--c-fill); }
.event-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 42px;
}
.event-time { font-size: 11px; color: var(--gem-accent); font-weight: 600; }
.event-dot-line {
  width: 2px;
  flex: 1;
  min-height: 12px;
  background: var(--gem-accent);
  border-radius: 1px;
  margin-top: 2px;
  opacity: .3;
}
.event-info { flex: 1; min-width: 0; }
.event-title {
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.event-meta {
  font-size: 11px;
  color: var(--c-label3);
  margin-top: 2px;
  display: flex;
  gap: 5px;
  align-items: center;
  flex-wrap: wrap;
}
.event-chevron { color: var(--c-label4); font-size: 14px; }
.repeat-badge {
  background: rgba(52,199,89,0.12);
  color: var(--c-green);
  padding: 1px 6px;
  border-radius: var(--r-full);
  font-size: 10px;
  font-weight: 600;
}

/* ════════════════════════════════
   MEMOS TAB
════════════════════════════════ */
#memos-tab { background: var(--c-bg); }

.memo-toolbar {
  background: var(--c-bg2);
  border-bottom: 1px solid var(--c-sep);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
.search-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--c-bg);
  border: 1.5px solid var(--c-sep);
  border-radius: var(--r-full);
  padding: 8px 14px;
  transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
}
.search-wrap:focus-within {
  border-color: var(--gem-accent);
  box-shadow: 0 0 0 3px var(--gem-accent-light);
}
.search-icon { font-size: 13px; color: var(--c-label3); flex-shrink: 0; }
.search-wrap input {
  flex: 1;
  font-size: 14px;
  color: var(--c-label);
  min-width: 0;
}
.search-wrap input::placeholder { color: var(--c-label3); }
#search-clear { color: var(--c-label3); font-size: 13px; }

.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 1px;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 5px 12px;
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 500;
  color: var(--c-label2);
  background: var(--c-fill);
  white-space: nowrap;
  transition: background var(--t) var(--ease), color var(--t) var(--ease);
  flex-shrink: 0;
}
.filter-chip.active {
  background: var(--gem-accent);
  color: #fff;
  font-weight: 600;
}
.filter-chip:not(.active):active { opacity: .7; }

#memo-list-container { flex: 1; overflow-y: auto; }
.memo-group { margin-bottom: 0; }
.section-label {
  padding: 16px 16px 6px;
  font-size: 12px;
  font-weight: 700;
  color: var(--c-label3);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* Things 3-style memo rows */
.memo-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 16px;
  background: var(--c-bg2);
  border-bottom: 1px solid var(--c-sep2);
  cursor: pointer;
  transition: background var(--t) var(--ease);
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.memo-group .memo-card:first-of-type { border-top: 1px solid var(--c-sep2); }
.memo-card.pinned { border-left: 3px solid var(--gem-accent); }
.memo-card:active { background: var(--c-fill); }
.memo-card:hover { background: var(--c-fill2); }

.memo-cat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.dot-일정 { background: var(--gem-accent); }
.dot-메모 { background: var(--c-green); }
.dot-할일 { background: var(--c-orange); }
.dot-기타 { background: var(--c-label4); }

.memo-body { flex: 1; min-width: 0; }
.memo-card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--c-label);
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.memo-card-preview {
  font-size: 12px;
  color: var(--c-label3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.35;
}
.memo-card-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.memo-card-date { font-size: 11px; color: var(--c-label4); }

.memo-card-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}
.memo-star { font-size: 14px; opacity: .6; }
.memo-star.on { opacity: 1; }

/* Swipe actions area */
.memo-card-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity var(--t) var(--ease);
}
.memo-card:hover .memo-card-actions { opacity: 1; }
.memo-action-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  color: var(--c-label3);
  transition: background var(--t) var(--ease), color var(--t) var(--ease);
}
.memo-action-btn:hover { background: var(--c-fill); color: var(--c-label2); }
.memo-action-btn.starred { color: var(--c-orange); }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 48px 24px;
  color: var(--c-label3);
  text-align: center;
}
.empty-icon { font-size: 48px; opacity: .35; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--c-label2); }
.empty-sub { font-size: 13px; }

/* Export row */
.export-section {
  background: var(--c-bg2);
  border-top: 1px solid var(--c-sep);
  padding: 10px 12px;
  display: flex;
  gap: 7px;
  flex-shrink: 0;
}
.export-btn {
  flex: 1;
  padding: 7px 4px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--gem-accent);
  background: var(--gem-accent-light);
  border: 1px solid rgba(66,133,244,0.2);
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: opacity var(--t) var(--ease);
  font-family: 'Courier New', monospace;
}
.export-btn:active { opacity: .7; }

/* ════════════════════════════════
   STATS TAB
════════════════════════════════ */
#stats-tab { background: var(--c-bg); overflow-y: auto; }
.stats-scroll { padding: 16px 16px 24px; display: flex; flex-direction: column; gap: 0; }

/* iOS grouped inset table style */
.stat-group { margin-bottom: 32px; }
.stat-group-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--c-label3);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 8px;
  padding: 0 4px;
}
.stat-group-card {
  background: var(--c-bg2);
  border-radius: var(--r-card);
  overflow: hidden;
}

.stat-numbers { display: grid; grid-template-columns: repeat(3, 1fr); }
.stat-num-item {
  padding: 16px 12px;
  text-align: center;
  border-right: 1px solid var(--c-sep2);
}
.stat-num-item:last-child { border-right: none; }
.stat-num {
  font-size: 30px;
  font-weight: 700;
  color: var(--c-label);
  letter-spacing: -1px;
  line-height: 1;
}
.stat-num.blue { color: var(--gem-accent); }
.stat-num.red  { color: var(--c-red); }
.stat-num.green { color: var(--c-green); }
.stat-num-label { font-size: 11px; color: var(--c-label3); margin-top: 4px; font-weight: 500; }

.stat-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-top: 1px solid var(--c-sep2);
}
.stat-row-label { font-size: 14px; color: var(--c-label); min-width: 44px; font-weight: 400; }
.stat-bar-wrap { flex: 1; height: 6px; background: var(--c-fill); border-radius: 3px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 3px; transition: width .9s var(--ease); }
.stat-row-count { font-size: 13px; color: var(--c-label3); min-width: 20px; text-align: right; font-weight: 500; }

.activity-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; padding: 14px; }
.activity-cell {
  aspect-ratio: 1;
  border-radius: 3px;
  background: var(--c-fill);
  transition: background var(--t) var(--ease);
}
.activity-cell.l1 { background: rgba(66,133,244,.12); }
.activity-cell.l2 { background: rgba(66,133,244,.35); }
.activity-cell.l3 { background: rgba(66,133,244,.6); }
.activity-cell.l4 { background: var(--gem-accent); }

.tag-cloud { padding: 12px 14px; display: flex; flex-wrap: wrap; gap: 7px; }
.tag-pill {
  padding: 4px 11px;
  border-radius: var(--r-full);
  background: var(--c-fill);
  font-size: 13px;
  font-weight: 500;
  color: var(--c-label2);
}
.tag-pill .count { color: var(--c-label4); font-size: 11px; margin-left: 2px; }

.alarm-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-top: 1px solid var(--c-sep2);
}
.alarm-icon-wrap {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: rgba(255,159,10,.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.alarm-info { flex: 1; }
.alarm-title { font-size: 14px; font-weight: 500; }
.alarm-date  { font-size: 12px; color: var(--c-label3); margin-top: 2px; }

/* ════════════════════════════════
   SHARED BADGES & CHIPS
════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: var(--r-full);
  font-size: 11px;
  font-weight: 600;
  gap: 3px;
}
.badge-일정 { background: rgba(66,133,244,.1); color: var(--gem-accent); }
.badge-메모 { background: rgba(52,199,89,.1); color: var(--c-green); }
.badge-할일 { background: rgba(255,159,10,.1); color: var(--c-orange); }
.badge-기타 { background: var(--c-fill); color: var(--c-label3); }

.tag-chip {
  display: inline-flex;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--gem-accent-light);
  color: var(--gem-accent);
  font-size: 11px;
  font-weight: 500;
  font-family: 'Courier New', monospace;
}
.repeat-badge-sm {
  display: inline-flex;
  padding: 1px 5px;
  border-radius: var(--r-full);
  background: rgba(52,199,89,.1);
  color: var(--c-green);
  font-size: 10px;
  font-weight: 600;
}

/* ════════════════════════════════
   MODAL (Bottom sheet)
════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 100;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadein .2s var(--ease);
}
@keyframes fadein { from { opacity:0; } to { opacity:1; } }
.modal {
  background: var(--c-bg2);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 460px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 0 0 max(20px, env(safe-area-inset-bottom));
  animation: sheetup .3s cubic-bezier(.32,1.1,.64,1);
}
@keyframes sheetup { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: var(--c-label4);
  margin: 10px auto 4px;
}
.modal-header {
  padding: 8px 16px 14px;
  border-bottom: 1px solid var(--c-sep2);
}
.modal-title { font-size: 17px; font-weight: 700; letter-spacing: -.4px; }
.modal-body { padding: 16px; }
.modal-field { margin-bottom: 14px; }
.modal-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--c-label3);
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 6px;
  display: block;
}
.modal-input, .modal-textarea, .modal-select {
  width: 100%;
  background: var(--c-bg);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  color: var(--c-label);
  border: 1.5px solid var(--c-sep);
  transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
}
.modal-input:focus, .modal-textarea:focus {
  border-color: var(--gem-accent);
  box-shadow: 0 0 0 3px var(--gem-accent-light);
  outline: none;
}
.modal-textarea { resize: none; height: 80px; line-height: 1.5; }
.modal-select { -webkit-appearance: none; }
.modal-actions {
  display: flex;
  gap: 8px;
  padding: 0 16px;
}
.btn-primary {
  flex: 1;
  padding: 12px;
  background: var(--gem-accent);
  color: #fff;
  border-radius: var(--r-full);
  font-size: 14px;
  font-weight: 600;
  transition: opacity var(--t) var(--ease), transform var(--t) var(--ease);
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { opacity: .8; }
.btn-secondary {
  padding: 12px 18px;
  background: var(--c-fill);
  color: var(--c-label2);
  border-radius: var(--r-full);
  font-size: 14px;
  font-weight: 500;
  transition: opacity var(--t) var(--ease);
}
.btn-secondary:active { opacity: .7; }
.btn-danger {
  padding: 12px 18px;
  background: rgba(217,48,37,.08);
  color: var(--c-red);
  border-radius: var(--r-full);
  font-size: 14px;
  font-weight: 600;
  transition: opacity var(--t) var(--ease);
}
.btn-danger:active { opacity: .7; }

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
.toast-container {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}
.toast {
  background: rgba(26,26,26,0.92);
  color: #dcddde;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 4px 24px rgba(0,0,0,.45);
  animation: toastin .28s cubic-bezier(.34,1.5,.64,1);
  white-space: nowrap;
}
@keyframes toastin {
  from { opacity:0; transform: translateY(12px) scale(.88); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.toast.fadeout { animation: toastout .22s var(--ease) forwards; }
@keyframes toastout { to { opacity:0; transform: translateY(6px) scale(.94); } }

/* ════════════════════════════════
   GEMINI EXTRAS
════════════════════════════════ */

/* 채팅 배경 - 완전 클린 */
#chat-tab { background: var(--c-bg); }
#chat-messages {
  background: var(--c-bg);
  padding: 16px 16px 8px;
}

/* 메시지 시간 - 작고 얇게 */
.msg-time {
  font-size: 11px;
  color: var(--c-label3);
  margin: 2px 4px 10px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.msg.bot .msg-time { margin-left: 44px; }

/* AI badge - 그라디언트 */
.ai-badge {
  background: var(--gem-grad);
  border-radius: var(--r-full);
  font-family: inherit;
}

/* mode toggle */
.mode-btn.active {
  background: var(--gem-accent);
  color: #fff;
  font-weight: 600;
}

/* 캘린더 오늘 */
.cal-day.today .day-num { background: var(--gem-accent); }
.cal-day.selected { background: var(--gem-accent-light); }
.cal-today-pill { background: var(--gem-accent-light); color: var(--gem-accent); border: none; }

/* 도트 */
.day-dot { background: var(--gem-accent); }
.dot-일정 { background: var(--gem-accent); }

/* 이벤트 */
.event-time { color: var(--gem-accent); }
.event-dot-line { background: var(--gem-accent); }

/* 메모 핀 */
.memo-card.pinned { border-left-color: var(--gem-accent); }

/* 배지 */
.badge-일정 { background: var(--gem-accent-light); color: var(--gem-accent); }
.tag-chip { background: var(--gem-accent-light); color: var(--gem-accent); font-family: inherit; border-radius: var(--r-full); }

/* 활동 그리드 */
.activity-cell.l1 { background: rgba(66,133,244,.12); }
.activity-cell.l2 { background: rgba(66,133,244,.32); }
.activity-cell.l3 { background: rgba(66,133,244,.6); }
.activity-cell.l4 { background: var(--gem-accent); }
.stat-num.blue { color: var(--gem-accent); }

/* 내보내기 */
.export-btn { color: var(--gem-accent); background: var(--gem-accent-light); border: none; border-radius: var(--r-full); font-family: inherit; }

/* 모달 타이틀 */
.modal-title { color: var(--c-label); font-weight: 600; }

/* 토스트 */
.toast {
  background: var(--c-label);
  color: var(--c-bg2);
  border: none;
  border-radius: var(--r-full);
}

/* Scrollbar */
::-webkit-scrollbar { width: 0; }


/* ════════════════════════════════
   DESKTOP
════════════════════════════════ */
@media (min-width: 480px) {
  body { background: #0d0d0d; }
  #app {
    border-radius: 16px;
    margin: 16px auto;
    height: calc(100vh - 32px);
    box-shadow: 0 24px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,0.05);
    overflow: hidden;
  }
  .modal { max-width: 460px; }
}

/* ════════════════════════════════
   18개 기능 CSS
════════════════════════════════ */

/* 2. 이미지 첨부 */
.attach-btn {
  padding: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gem-accent);
  font-size: 16px;
  border-radius: var(--r-sm);
  transition: background var(--t) var(--ease);
  cursor: pointer;
}
.attach-btn:hover { background: var(--gem-accent-light); }
.image-thumbnail {
  max-width: 120px;
  max-height: 120px;
  border-radius: var(--r-sm);
  margin-top: 4px;
  cursor: pointer;
  border: 1px solid var(--c-sep);
}
.msg-image {
  max-width: 140px;
  border-radius: var(--r-sm);
  margin-top: 4px;
}

/* 5. 클립보드 배너 */
.clipboard-banner {
  background: linear-gradient(135deg, var(--gem-accent-light), var(--gem-accent-glow));
  border: 1px solid var(--gem-accent);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  animation: slideDown .2s var(--ease);
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.clipboard-banner-text { font-size: 13px; flex: 1; }
.clipboard-banner-actions { display: flex; gap: 4px; }
.clipboard-btn {
  padding: 4px 12px;
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 500;
  border: none;
  cursor: pointer;
}
.clipboard-btn.accept { background: var(--gem-accent); color: white; }
.clipboard-btn.reject { background: var(--c-fill); color: var(--c-label2); }

/* 8. 메모 AI 요약 */
.summary-btn {
  padding: 4px 12px;
  background: var(--gem-accent-light);
  color: var(--gem-accent);
  border: none;
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 8px;
}

/* 9. 관련 메모 섹션 */
.related-memos {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--c-sep2);
}
.related-memos-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--c-label3);
  margin-bottom: 4px;
}
.related-memo-item {
  padding: 4px 8px;
  border-radius: var(--r-sm);
  background: var(--c-fill);
  font-size: 12px;
  cursor: pointer;
  transition: background var(--t) var(--ease);
}
.related-memo-item:hover { background: var(--c-fill2); }

/* 10. 스마트 알람 */
.alarm-suggestion {
  margin-top: 8px;
  padding: 8px;
  background: rgba(242, 153, 0, 0.1);
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  gap: 8px;
}
.alarm-btn {
  padding: 4px 8px;
  background: var(--c-orange);
  color: white;
  border: none;
  border-radius: var(--r-sm);
  font-size: 11px;
  cursor: pointer;
}

/* 11. 할일 체크박스 */
.todo-checkbox {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--gem-accent);
}
.memo-card.todo-done {
  opacity: 0.6;
}
.memo-card.todo-done .msg-card .card-title {
  text-decoration: line-through;
  color: var(--c-label3);
}

/* 12. 반복 일정 */
.cal-day-dot.repeat {
  background: var(--c-orange);
}

/* 16. 타임라인 뷰 */
#timeline-tab { background: var(--c-bg); }
.timeline-container {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.timeline-date-group {
  margin-bottom: 20px;
}
.timeline-date-header {
  font-weight: 600;
  color: var(--c-label);
  margin-bottom: 10px;
  font-size: 13px;
  letter-spacing: 0.5px;
}
.timeline-item {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  position: relative;
}
.timeline-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 4px;

<script>
// ============================================================
// 1. STORAGE SYSTEM
// ============================================================
class MemoStorage {
  constructor() {
    this._load();
    window.storage = this;
  }
  _load() {
    try {
      const d = localStorage.getItem('chatmemo_v2');
      this._data = d ? JSON.parse(d) : {};
    } catch(e) { this._data = {}; }
    if (!this._data['index']) this._data['index'] = [];
  }
  _save() {
    try { localStorage.setItem('chatmemo_v2', JSON.stringify(this._data)); } catch(e) {}
  }
  setItem(key, value) {
    this._data[key] = value;
    const idx = this._data['index'];
    if (!idx.includes(key)) idx.push(key);
    this._save();
  }
  getItem(key) { return this._data[key] ?? null; }
  removeItem(key) {
    delete this._data[key];
    this._data['index'] = (this._data['index'] || []).filter(k => k !== key);
    this._save();
  }
  getAllMemos() {
    return (this._data['index'] || [])
      .filter(k => k.startsWith('memo:'))
      .map(k => this._data[k])
      .filter(Boolean)
      .sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0) || new Date(b.createdAt) - new Date(a.createdAt));
  }
  getAllEvents() {
    return (this._data['index'] || [])
      .filter(k => k.startsWith('event:'))
      .map(k => this._data[k])
      .filter(Boolean)
      .sort((a,b) => new Date(a.date + 'T' + (a.time||'00:00')) - new Date(b.date + 'T' + (b.time||'00:00')));
  }
  getAll() { return [...this.getAllMemos(), ...this.getAllEvents()]; }
}

// ============================================================
// 2. 한국어 날짜/시간 파서
// ============================================================
const Parser = {
  parseDate(text) {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
    if (/오늘/.test(text)) return new Date(y, m, d);
    if (/내일/.test(text)) return new Date(y, m, d+1);
    if (/모레/.test(text)) return new Date(y, m, d+2);
    if (/어제/.test(text)) return new Date(y, m, d-1);
    const nextWeekDay = text.match(/다음\s*주?\s*(월|화|수|목|금|토|일)요일/);
    if (nextWeekDay) {
      const days = {월:1,화:2,수:3,목:4,금:5,토:6,일:0};
      const target = days[nextWeekDay[1]]; const cur = now.getDay();
      let diff = target - cur; if (diff <= 0) diff += 7; diff += 7;
      return new Date(y, m, d + diff);
    }
    const thisWeekDay = text.match(/(?:이번\s*주?\s*)?(월|화|수|목|금|토|일)요일/);
    if (thisWeekDay) {
      const days = {월:1,화:2,수:3,목:4,금:5,토:6,일:0};
      const target = days[thisWeekDay[1]]; const cur = now.getDay();
      let diff = target - cur; if (diff < 0) diff += 7;
      return new Date(y, m, d + diff);
    }
    const mday = text.match(/(\d{1,2})월\s*(\d{1,2})일/);
    if (mday) { const mo = parseInt(mday[1])-1, da = parseInt(mday[2]); return new Date(y, mo, da); }
    const iso = text.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
    if (iso) return new Date(parseInt(iso[1]), parseInt(iso[2])-1, parseInt(iso[3]));
    return null;
  },
  parseTime(text) {
    const kr = text.match(/(오전|오후)\s*(\d{1,2})시\s*(?:(\d{1,2})분)?/);
    if (kr) {
      let h = parseInt(kr[2]); const min = parseInt(kr[3]||'0');
      if (kr[1]==='오후' && h<12) h+=12; if (kr[1]==='오전' && h===12) h=0;
      return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
    }
    const t1 = text.match(/(\d{1,2})시\s*(?:(\d{1,2})분)?/);
    if (t1) { const h=parseInt(t1[1]), min=parseInt(t1[2]||'0'); return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`; }
    const t2 = text.match(/(\d{1,2}):(\d{2})/);
    if (t2) return `${String(parseInt(t2[1])).padStart(2,'0')}:${t2[2]}`;
    return null;
  },
  parseRepeat(text) {
    if (/매일|daily/i.test(text)) return 'daily';
    if (/매주|weekly/i.test(text)) return 'weekly';
    if (/매월|매달|monthly/i.test(text)) return 'monthly';
    if (/매년|yearly/i.test(text)) return 'yearly';
    return null;
  },
  extractTags(text) { const m = text.match(/#[\w가-힣]+/g); return m ? [...new Set(m)] : []; },
  extractURLs(text) { const m = text.match(/https?:\/\/[^\s\u3000-\u9fff]+/g); return m || []; },
  classifyCategory(text, hasDate) {
    if (hasDate) return '일정';
    if (/#할일|해야|to.?do/i.test(text)) return '할일';
    if (/회의|미팅|약속|마감|발표/i.test(text)) return '일정';
    if (/아이디어|생각|구상|note/i.test(text)) return '메모';
    return '기타';
  },
  formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T12:00:00');
    return `${d.getMonth()+1}/${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})`;
  }
};

// ============================================================
// 3. ALARM MANAGER
// ============================================================
const AlarmManager = {
  timers: {},
  async requestPermission() {
    if (!('Notification' in window)) return false;
    if (Notification.permission === 'granted') return true;
    return (await Notification.requestPermission()) === 'granted';
  },
  schedule(event) {
    if (!event.date || !event.alarm) return;
    const diff = new Date(event.date + 'T' + event.alarm) - new Date();
    if (diff <= 0) return;
    if (this.timers[event.id]) clearTimeout(this.timers[event.id]);
    this.timers[event.id] = setTimeout(async () => {
      if (await this.requestPermission()) new Notification('⏰ 메모 알람', { body: event.title || event.text });
      showToast(`⏰ ${event.title || event.text}`);
    }, Math.min(diff, 2147483647));
  },
  scheduleAll(events) { events.forEach(e => this.schedule(e)); },
  cancel(id) { if (this.timers[id]) { clearTimeout(this.timers[id]); delete this.timers[id]; } }
};

// ============================================================
// 4. STATE
// ============================================================
const storage = new MemoStorage();
let currentTab = 'chat';
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth(), calSelectedDate = null;
let activeFilter = '전체', searchQuery = '';
let isDark = localStorage.getItem('theme') ? localStorage.getItem('theme') === 'dark' : true;

// ============================================================
// 5. TOAST
// ============================================================

  const c = document.getElementById('toast-container');

function fmtTime(date) {
  const h = date.getHours(), m = date.getMinutes();
  return `${h>=12?'오후':'오전'} ${h%12||12}:${String(m).padStart(2,'0')}`;
}

function addMsg(text, type, card = null, urls = []) {
  const ctr = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${type}`;

  const bbl = document.createElement('div');
  bbl.className = 'msg-bubble';
  bbl.innerHTML = linkify(esc(text));
  wrap.appendChild(bbl);

  if (card) {
    const ce = document.createElement('div');
    ce.className = 'msg-card';
    let h = `<div class="card-title">${esc(card.title || card.text || '')}</div><div class="card-meta">`;
    h += `<span class="badge badge-${card.category}">${catIcon(card.category)} ${card.category}</span>`;
    if (card.date) h += `<span style="font-size:11px;color:var(--c-label3)">📅 ${Parser.formatDate(card.date)}</span>`;
    if (card.time) h += `<span style="font-size:11px;color:var(--c-label3)">⏰ ${card.time}</span>`;
    if (card.repeat) h += `<span class="repeat-badge-sm">🔁 ${rl(card.repeat)}</span>`;
    if (card.tags?.length) h += card.tags.map(t=>`<span class="tag-chip">${t}</span>`).join('');
    h += '</div>';
    ce.innerHTML = h; wrap.appendChild(ce);
  }

  urls.forEach(url => {
    const a = document.createElement('a');
    a.className = 'url-preview'; a.href = url; a.target = '_blank'; a.rel = 'noopener';
    a.innerHTML = `🔗 <span>${url.length>44?url.slice(0,44)+'…':url}</span>`;
    wrap.appendChild(a);
  });

  const te = document.createElement('div');
  te.className = 'msg-time'; te.textContent = fmtTime(new Date());
  wrap.appendChild(te);
  ctr.appendChild(wrap);
  ctr.scrollTop = ctr.scrollHeight;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function linkify(s) { return s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:var(--c-blue)">$1</a>'); }
function catIcon(c) { return {일정:'📅',메모:'📝',할일:'✅',기타:'📁'}[c]||'📁'; }
function rl(r) { return {daily:'매일',weekly:'매주',monthly:'매월',yearly:'매년'}[r]||r; }

function processInput(text) {
  text = text.trim(); if (!text) return;
  addMsg(text, 'user');

  const apiKey = localStorage.getItem('anthropic_api_key');
  if (apiKey && apiKey.startsWith('sk-')) {
    // API 있으면 Claude가 의도 판단 + 처리까지
    addTypingBubble();
    setTimeout(() => callClaudeDecideAndAct(text), 200);
  } else {
    // API 없으면 regex fallback
    if (isQuestion(text)) {
      addTypingBubble();
      setTimeout(() => localSearch(text), 200);
    } else {
      saveLocally(text);
    }
  }
}

function saveLocally(text) {
  const date = Parser.parseDate(text), time = Parser.parseTime(text);
  const repeat = Parser.parseRepeat(text), tags = Parser.extractTags(text), urls = Parser.extractURLs(text);
  const category = Parser.classifyCategory(text, !!date);
  const now = new Date(), ts = now.getTime();

  if (category === '일정' || date) {
    const ds = date ? `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}` : null;
    let alarmStr = null;
    if (ds && time) {
      const ad = new Date(ds + 'T' + time); ad.setMinutes(ad.getMinutes()-30);
      alarmStr = `${String(ad.getHours()).padStart(2,'0')}:${String(ad.getMinutes()).padStart(2,'0')}`;
    }
    const saved = { id:`event:${ts}`, key:`event:${ts}`, title:extractTitle(text), text, category:'일정', date:ds, time, alarm:alarmStr, repeat, tags, urls, starred:false, pinned:false, createdAt:now.toISOString() };
    storage.setItem(`event:${ts}`, saved); AlarmManager.schedule(saved);
    let reply = `저장했어요 ✓  ${saved.title}`;
    if (ds) reply += `  ·  ${Parser.formatDate(ds)}${time?' '+time:''}`;
    if (repeat) reply += `  ·  🔁${rl(repeat)}`;
    if (alarmStr) reply += `\n알람 ${alarmStr} 설정됨`;
    addMsg(reply, 'bot', saved, urls);
  } else {
    const saved = { id:`memo:${ts}`, key:`memo:${ts}`, text, category, tags, urls, starred:false, pinned:false, createdAt:now.toISOString() };
    storage.setItem(`memo:${ts}`, saved);
    addMsg(`저장했어요 ✓  ${text.length>42?text.slice(0,42)+'…':text}`, 'bot', saved, urls);
  }
}

async function callClaudeDecideAndAct(text) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  const model = localStorage.getItem('anthropic_model') || 'claude-haiku-4-5-20251001';
  const all = storage.getAll();
  const ctx = all.length
    ? all.slice(0,60).map((m,i) => {
        let s = `[${i+1}][${m.category}] ${m.text||''}`;
        if (m.date) s += ` (날짜:${m.date}${m.time?' '+m.time:''})`;
        if (m.tags?.length) s += ` (태그:${m.tags.join(',')})`;
        return s;
      }).join('\n')
    : '(저장된 메모 없음)';

  const sys = `당신은 사용자의 개인 메모 비서입니다. 오늘 날짜: ${new Date().toLocaleDateString('ko-KR')}.

저장된 메모 목록:
${ctx}

[규칙]
사용자 입력을 받으면 먼저 의도를 판단하세요.

저장 요청: 새로운 사실·일정·할일·아이디어를 기록하려는 것
검색/질문: 이전에 저장한 내용을 찾거나, 기억을 되살리거나, 뭔가를 물어보는 것

응답 형식 — 반드시 첫 줄에 아래 중 하나로 시작:
ACTION:SAVE
ACTION:SEARCH

그 다음 줄부터 사용자에게 보낼 한국어 답변을 작성하세요.
- 저장이면: 간결하게 "✓ 저장했어요" + 핵심 내용 요약 (1~2줄) + 
  마지막에 JSON 형식으로 태그 추천: {"tags":["추천태그1","추천태그2"]}
- 검색이면: 관련 메모를 자연스럽게 인용하며 답변 (3~5줄 이내)`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model, max_tokens: 512, system: sys, messages: [{ role: 'user', content: text }] })
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const full = data.content[0].text.trim();
    const lines = full.split('\n');
    const action = lines[0].trim();
    const reply = lines.slice(1).join('\n').trim();

    removeTypingBubble();

    if (action === 'ACTION:SAVE') {
      // Claude가 저장으로 판단 → Parser로 파싱 후 실제 저장
      const date = Parser.parseDate(text), time = Parser.parseTime(text);
      let repeat = Parser.parseRepeat(text), tags = Parser.extractTags(text), urls = Parser.extractURLs(text);
      const category = Parser.classifyCategory(text, !!date);
      const now = new Date(), ts = now.getTime();
      
      // AI 자동 태그 추출 (7번 기능)
      const tagMatch = reply.match(/{\s*"tags"\s*:\s*\[([^\]]+)\]\s*}/);
      if (tagMatch) {
        try {
          const tagsStr = '[' + tagMatch[1] + ']';
          const aiTags = JSON.parse(tagsStr);
          if (Array.isArray(aiTags)) {
            tags = [...new Set([...tags, ...aiTags])];
          }
        } catch(e) {}
      }
      
      let saved;
      if (category === '일정' || date) {
        const ds = date ? `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}` : null;
        let alarmStr = null;
        if (ds && time) { const ad = new Date(ds+'T'+time); ad.setMinutes(ad.getMinutes()-30); alarmStr=`${String(ad.getHours()).padStart(2,'0')}:${String(ad.getMinutes()).padStart(2,'0')}`; }
        saved = { id:`event:${ts}`, key:`event:${ts}`, title:extractTitle(text), text, category:'일정', date:ds, time, alarm:alarmStr, repeat, tags, urls, starred:false, pinned:false, color:'blue', image:attachedImage, createdAt:now.toISOString() };
        storage.setItem(`event:${ts}`, saved); AlarmManager.schedule(saved);
      } else {
        saved = { id:`memo:${ts}`, key:`memo:${ts}`, text, category, tags, urls, starred:false, pinned:false, color:'blue', image:attachedImage, createdAt:now.toISOString() };
        storage.setItem(`memo:${ts}`, saved);
      }
      attachedImage = null;
      addMsg(reply || `✓ 저장했어요  ${text.slice(0,42)}`, 'bot', saved, []);
    } else {
      // ACTION:SEARCH 또는 판단 불명확 → 답변만 표시
      addMsg(reply || full, 'bot');
    }
  } catch(e) {
    removeTypingBubble();
    addMsg('오류가 발생했어요. 잠시 후 다시 시도해주세요.', 'bot');
  }
}

function extractTitle(text) {
  return text
    .replace(/(오전|오후)\s*\d{1,2}시\s*(\d{1,2}분)?/g, '')
    .replace(/\d{1,2}시\s*(\d{1,2}분)?/g, '')
    .replace(/\d{1,4}년\s*\d{1,2}월\s*\d{1,2}일/g, '')
    .replace(/\d{1,2}월\s*\d{1,2}일/g, '')
    .replace(/내일|오늘|모레|글피|다음\s*주?|이번\s*주?/g, '')
    .replace(/(월|화|수|목|금|토|일)요일/g, '')
    .replace(/매일|매주|매월|매년/g, '')
    .replace(/#[\w가-힣]+/g, '')
    .replace(/https?:\/\/[^\s]+/g, '')
    // 날짜 제거 후 문장 앞뒤에 남은 조사/접속사 정리
    .replace(/^[\s,·~\-~에은는이가을를과와도만의로부터까지에서]+/, '')
    .replace(/[\s,·~\-]+$/, '')
    .replace(/\s{2,}/g, ' ')
    .trim() || text.slice(0, 30);
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = `${calYear}년 ${calMonth+1}월`;
  const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
  const events = storage.getAllEvents();
  const eventMap = {};
  events.forEach(ev => {
    if (!ev.date) return;
    addToMap(eventMap, ev.date, ev);
    if (ev.repeat) {
      const end = new Date(calYear, calMonth+2, 0); let cur = new Date(ev.date+'T12:00:00');
      while (cur <= end) {
        if (ev.repeat==='daily') cur.setDate(cur.getDate()+1);
        else if (ev.repeat==='weekly') cur.setDate(cur.getDate()+7);
        else if (ev.repeat==='monthly') cur.setMonth(cur.getMonth()+1);
        else if (ev.repeat==='yearly') cur.setFullYear(cur.getFullYear()+1);
        else break;
        if (cur<=end) addToMap(eventMap, ds2(cur), {...ev, date:ds2(cur), _rep:true});
      }
    }
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div'); cell.className = 'cal-day';
    let day, month, year, isOther = false;
    if (i < firstDay) { day=daysInPrev-firstDay+i+1; month=calMonth-1; year=calYear; if(month<0){month=11;year--;} isOther=true; }
    else if (i >= firstDay+daysInMonth) { day=i-firstDay-daysInMonth+1; month=calMonth+1; year=calYear; if(month>11){month=0;year++;} isOther=true; }
    else { day=i-firstDay+1; month=calMonth; year=calYear; }
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = year===today.getFullYear()&&month===today.getMonth()&&day===today.getDate();
    if (isOther) cell.classList.add('other-month');
    if (isToday) cell.classList.add('today');
    if (calSelectedDate===ds) cell.classList.add('selected');

    const numEl = document.createElement('div'); numEl.className='day-num'; numEl.textContent=day;
    cell.appendChild(numEl);

    const evs = eventMap[ds]||[];
    if (evs.length) {
      const dots = document.createElement('div'); dots.className='day-dots';
      evs.slice(0,3).forEach((ev)=>{ 
        const d=document.createElement('div'); 
        d.className='day-dot' + (ev.repeat && ev.repeat !== '없음' ? ' repeat' : ''); 
        dots.appendChild(d); 
      });
      cell.appendChild(dots);
    }
    cell.addEventListener('click', () => { calSelectedDate=ds; renderCalendar(); showCalEvents(ds, eventMap[ds]||[]); });
    grid.appendChild(cell);
  }
  if (!calSelectedDate) { const ts=ds2(today); showCalEvents(ts, eventMap[ts]||[]); }
  else showCalEvents(calSelectedDate, eventMap[calSelectedDate]||[]);
}

function addToMap(map,key,val){if(!map[key])map[key]=[];map[key].push(val);}
function ds2(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function renderMemoList() {
  const ctr = document.getElementById('memo-list-container');
  let items = storage.getAll();
  
  // 검색 필터
  if (searchQuery) { 
    const q=searchQuery.toLowerCase(); 
    items=items.filter(m=>(m.text||'').toLowerCase().includes(q)||(m.title||'').toLowerCase().includes(q)||(m.tags||[]).some(t=>t.toLowerCase().includes(q))); 
    saveSearchTerm(searchQuery);
  }
  
  // 날짜 범위 필터
  if (window.dateRangeFilter && window.dateRangeFilter.start && window.dateRangeFilter.end) {
    items = items.filter(m => {
      const mDate = m.date || m.createdAt?.split('T')[0];
      return mDate && mDate >= window.dateRangeFilter.start && mDate <= window.dateRangeFilter.end;
    });
  }
  
  // 카테고리 필터
  if (activeFilter==='즐겨찾기') items=items.filter(m=>m.starred);
  else if (activeFilter==='핀') items=items.filter(m=>m.pinned);
  else if (activeFilter!=='전체') items=items.filter(m=>m.category===activeFilter);
  ctr.innerHTML = '';
  if (!items.length) {
    ctr.innerHTML=`<div class="empty-state"><div class="empty-icon">${searchQuery?'🔍':'📭'}</div><div class="empty-title">${searchQuery?'검색 결과 없음':'메모가 없어요'}</div><div class="empty-sub">${searchQuery?'다른 키워드를 입력해보세요':'채팅 탭에서 메모를 입력해보세요'}</div></div>`;
    return;
  }
  const pinned=items.filter(m=>m.pinned), rest=items.filter(m=>!m.pinned);
  if (pinned.length) {
    const g=document.createElement('div'); g.className='memo-group';
    const lbl=document.createElement('div'); lbl.className='section-label'; lbl.textContent='고정됨';
    g.appendChild(lbl); pinned.forEach(m=>g.appendChild(createMemoCard(m))); ctr.appendChild(g);
  }
  if (rest.length) {
    const g=document.createElement('div'); g.className='memo-group';
    if (pinned.length){const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent='전체';g.appendChild(lbl);}
    rest.forEach(m=>g.appendChild(createMemoCard(m))); ctr.appendChild(g);
  }
}

function createMemoCard(item) {
  const card = document.createElement('div');
  card.className = 'memo-card' + (item.pinned?' pinned':'') + (item.secret?' secret':'') + (item.done?' todo-done':'');
  card.setAttribute('data-color', item.color || 'blue');
  const title = item.title || item.text || '';
  const preview = title !== item.text ? item.text : '';
  
  let html = `
    <div class="memo-cat-dot dot-${item.category}"></div>
    <div class="memo-body">
      <div style="display:flex;align-items:center;gap:6px">
        ${item.category === '할일' ? `<input type="checkbox" class="todo-checkbox" data-id="${item.key}" ${item.done ? 'checked' : ''}>` : ''}
        <div class="memo-card-title">${esc(title.slice(0,60))}</div>
      </div>
      ${preview ? `<div class="memo-card-preview">${esc(preview.slice(0,60))}</div>` : ''}
      ${item.image ? `<img src="${item.image}" class="image-thumbnail" style="margin-top:6px;">` : ''}
      <div class="memo-card-meta">
        <span class="memo-card-date">${new Date(item.createdAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'})}</span>
        ${item.date ? `<span style="font-size:11px;color:var(--c-blue)">📅 ${Parser.formatDate(item.date)}</span>` : ''}
        ${(item.tags||[]).slice(0,2).map(t=>`<span class="tag-chip">${t}</span>`).join('')}
      </div>
    </div>
    <div class="memo-card-right">
      <div class="memo-card-actions">
        <button class="memo-action-btn star-btn ${item.starred?'starred':''}">${item.starred?'⭐':'☆'}</button>
        <button class="memo-action-btn pin-btn">${item.pinned?'📌':'·'}</button>
        <button class="memo-action-btn edit-btn">✏️</button>
        <button class="memo-action-btn del-btn">🗑</button>
      </div>
      <span class="memo-star ${item.starred?'on':''}">${item.starred?'⭐':''}</span>
    </div>`;
  
  card.innerHTML = html;
  card.querySelector('.star-btn').addEventListener('click',e=>{e.stopPropagation();item.starred=!item.starred;storage.setItem(item.key,item);renderMemoList();showToast(item.starred?'즐겨찾기 추가':'즐겨찾기 해제');});
  card.querySelector('.pin-btn').addEventListener('click',e=>{e.stopPropagation();item.pinned=!item.pinned;storage.setItem(item.key,item);renderMemoList();showToast(item.pinned?'고정됨':'고정 해제');});
  card.querySelector('.edit-btn').addEventListener('click',e=>{e.stopPropagation();showEditModal(item);});
  card.querySelector('.del-btn').addEventListener('click',e=>{e.stopPropagation();showDeleteConfirm(item);});
  
  const todoCheckbox = card.querySelector('.todo-checkbox');
  if (todoCheckbox) {
    todoCheckbox.addEventListener('change', (e) => {
      e.stopPropagation();
      item.done = e.target.checked;
      storage.setItem(item.key, item);
      renderMemoList();
    });
  }
  
  card.addEventListener('click', () => showMemoModal(item));
  return card;
}

function saveEdit(key, isEv) {
  const item = storage.getItem(key); if (!item) return;
  item.text = document.getElementById('edit-text').value;
  item.category = document.getElementById('edit-cat').value;
  if (isEv) {
    item.date = document.getElementById('edit-date').value;
    item.time = document.getElementById('edit-time').value||null;
    item.alarm = document.getElementById('edit-alarm').value||null;
    item.repeat = document.getElementById('edit-repeat').value||null;
    item.title = extractTitle(item.text);
    AlarmManager.cancel(key); AlarmManager.schedule(item);
  }
  item.tags = (document.getElementById('edit-tags').value.match(/#[\w가-힣]+/g)||[]);
  item.color = document.getElementById('edit-color')?.value || 'blue';

function renderStats() {
  const all=storage.getAll(), memos=storage.getAllMemos(), events=storage.getAllEvents();
  document.getElementById('stat-numbers').innerHTML=`
    <div class="stat-num-item"><div class="stat-num">${all.length}</div><div class="stat-num-label">전체</div></div>
    <div class="stat-num-item"><div class="stat-num blue">${events.length}</div><div class="stat-num-label">일정</div></div>
    <div class="stat-num-item"><div class="stat-num green">${memos.length}</div><div class="stat-num-label">메모</div></div>`;

  const cats={일정:0,메모:0,할일:0,기타:0}; all.forEach(m=>{if(cats[m.category]!==undefined)cats[m.category]++;});
  const maxC=Math.max(...Object.values(cats),1);
  const catColors={일정:'var(--c-blue)',메모:'var(--c-green)',할일:'var(--c-orange)',기타:'var(--c-label4)'};
  document.getElementById('stat-category-chart').innerHTML = Object.entries(cats).map(([cat,count],i)=>`
    <div class="stat-row" style="${i===0?'border-top:none':''}">
      <div class="stat-row-label">${catIcon(cat)} ${cat}</div>
      <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${(count/maxC*100).toFixed(0)}%;background:${catColors[cat]}"></div></div>
      <div class="stat-row-count">${count}</div>
    </div>`).join('');

  const tagCount={}; all.forEach(m=>(m.tags||[]).forEach(t=>{tagCount[t]=(tagCount[t]||0)+1;}));
  const tags=document.getElementById('stat-tags');
  const sorted=Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,12);
  tags.innerHTML = sorted.length ? sorted.map(([tag,cnt])=>`<span class="tag-pill">${tag}<span class="count">${cnt}</span></span>`).join('') : '<span style="font-size:13px;color:var(--c-label3)">태그 없음</span>';

  const actEl=document.getElementById('stat-activity'); actEl.innerHTML='';
  const today=new Date(), dayCount={};
  all.forEach(m=>{const d=m.createdAt?.slice(0,10);if(d)dayCount[d]=(dayCount[d]||0)+1;});
  const maxA=Math.max(...Object.values(dayCount),1);
  for(let i=27;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const ds=ds2(d),cnt=dayCount[ds]||0;const lvl=cnt===0?0:cnt<maxA*.25?1:cnt<maxA*.5?2:cnt<maxA*.75?3:4;const cell=document.createElement('div');cell.className=`activity-cell l${lvl}`;cell.title=`${d.getMonth()+1}/${d.getDate()}: ${cnt}개`;actEl.appendChild(cell);}

  const now=new Date(), upcoming=events.filter(e=>e.date&&e.alarm&&new Date(e.date+'T'+e.alarm)>now).sort((a,b)=>new Date(a.date+'T'+a.alarm)-new Date(b.date+'T'+b.alarm)).slice(0,5);
  const alEl=document.getElementById('stat-alarms');
  alEl.innerHTML = upcoming.length ? upcoming.map((e,i)=>`
    <div class="alarm-row" style="${i===0?'border-top:none':''}">
      <div class="alarm-icon-wrap">⏰</div>
      <div class="alarm-info">
        <div class="alarm-title">${esc(e.title||e.text?.slice(0,28)||'')}</div>
        <div class="alarm-date">${Parser.formatDate(e.date)} ${e.alarm}</div>
      </div>
    </div>`).join('') : '<div style="padding:14px 14px;font-size:13px;color:var(--c-label3)">예정된 알람 없음</div>';
}

function isQuestion(text) {
  if(currentMode==='save') return false;
  if(currentMode==='search') return true;

  const patterns = [
    // 물음표
    /\?$/, /？$/,
    // 명시적 검색/요청
    /찾아줘|찾아봐|검색|알려줘|보여줘/,
    // 뭐야/뭘/무엇 계열 (목적격 뭘 포함)
    /뭐야|뭐였|뭐지|뭘|무엇|무슨/,
    // 존재 확인 (물음표 있을 때만, 또는 "뭐 있어" 형태)
    /있어\?$|있나\??$|있지\??$|뭐.{0,6}있어$|가.{0,4}있어$/,
    // 의문사
    /언제|어디|어떤|어떻게/,
    // 기억/저장 확인
    /기억|저장했|저장된|메모한|메모했|써놨|적어뒀/,
    // 관계
    /관련|관해|대해/,
    // 요약/정리
    /정리해|요약해|요약|정리/,
    // ← 핵심 추가: 기억 더듬는 말투 (~더라, ~였더라, ~했더라, ~하더라)
    /더라$|었더라$|았더라$|하더라$|이더라$/,
    // 기억이 안 남 패턴
    /기억이|생각이 안|뭐였|까먹|잊어/,
    // 해야 할 것 찾기 패턴
    /해야.*뭐|뭐.*해야|할 게 뭐|할게 뭐/,
  ];

  return patterns.some(p => p.test(text));
}

function localSearch(query) {
  // API 없을 때 키워드 기반 로컬 검색 fallback
  const all = storage.getAll();
  if (!all.length) { removeTypingBubble(); addMsg('저장된 메모가 없어요. 먼저 메모를 입력해보세요!', 'bot'); return; }
  // 쿼리에서 의미 있는 키워드 추출 (조사/어미 제거)
  const stopwords = /내가|이게|그게|뭘|뭐|해야|하더라|였더라|했더라|하더라|더라|거|을|를|이|가|은|는|의|에|도|만|과|와/g;
  const keywords = query.replace(stopwords, ' ').trim().split(/\s+/).filter(k => k.length > 1);
  // 할일 카테고리 우선 검색
  let results = all.filter(m => {
    if (keywords.length === 0) return m.category === '할일';
    return keywords.some(k => (m.text||'').includes(k) || (m.tags||[]).some(t=>t.includes(k)));
  });
  // 키워드 매칭 없으면 할일 전체 보여주기
  if (!results.length) results = all.filter(m => m.category === '할일').slice(0, 5);
  if (!results.length) results = all.slice(0, 5);
  removeTypingBubble();
  const items = results.slice(0,5).map(m=>`• ${m.text||m.title||''}${m.date?` (${m.date})`:''}${m.category?` [${m.category}]`:''}`).join('\n');
  addMsg(`찾아봤어요! 관련 항목이에요:\n\n${items}\n\n💡 AI 검색을 쓰면 더 정확해요 (상단 버튼에서 API 키 등록)`, 'bot');
  // 검색 결과 카드 표시
  const lastBot = document.querySelector('.msg.bot:last-child');
  if (lastBot) {
    results.slice(0,3).forEach(m => {
      const ce = document.createElement('div'); ce.className = 'ai-result-card';
      ce.innerHTML = `<div class="ai-result-memo"><div class="ai-result-memo-cat">${m.category||'기타'}</div><div class="ai-result-memo-text">${esc(m.text||'').slice(0,80)}</div></div>`;
      lastBot.insertBefore(ce, lastBot.querySelector('.msg-time'));
    });
  }
}

async function callClaudeWithMemos(query) {
  const apiKey=localStorage.getItem('anthropic_api_key'), model=localStorage.getItem('anthropic_model')||'claude-haiku-4-5-20251001';
  if(!apiKey||!apiKey.startsWith('sk-')){ localSearch(query); return; }
  const all=storage.getAll();
  if(!all.length){removeTypingBubble(); addMsg('저장된 메모가 없어요. 먼저 메모를 입력해보세요!','bot');return;}
  const ctx=all.slice(0,50).map((m,i)=>{let s=`[${i+1}][${m.category}] ${m.text||''}`;if(m.date)s+=` (날짜:${m.date}${m.time?' '+m.time:''})`;if(m.tags?.length)s+=` (태그:${m.tags.join(',')})`;return s;}).join('\n');
  const sys=`당신은 사용자의 메모 비서입니다.\n\n저장된 메모:\n${ctx}\n\n규칙: 관련 메모를 찾아 [번호] 형식으로 인용해서 한국어로 친근하게 답하세요. 3-5문장 이내로 간결하게.`;
  removeTypingBubble(); const bubble=addStreamingMsg();
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,max_tokens:1024,stream:true,system:sys,messages:[{role:'user',content:query}]})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`);}
    const reader=res.body.getReader(), dec=new TextDecoder(); let full='', buf='';
    while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();for(const l of lines){if(!l.startsWith('data: '))continue;const d=l.slice(6).trim();if(d==='[DONE]')continue;try{const p=JSON.parse(d);if(p.type==='content_block_delta'&&p.delta?.text){full+=p.delta.text;bubble.innerHTML=esc(full).replace(/\[(\d+)\]/g,'<span style="background:var(--c-blue-bg);color:var(--c-blue);padding:1px 5px;border-radius:4px;font-size:11px;font-weight:700">[$1]</span>');document.getElementById('chat-messages').scrollTop=document.getElementById('chat-messages').scrollHeight;}}catch(e){}}}
    finalizeStream(bubble);
    const refs=[...new Set([...full.matchAll(/\[(\d+)\]/g)].map(m=>parseInt(m[1])-1))];
    if(refs.length){const rc=document.createElement('div');rc.className='ai-result-card';rc.innerHTML=`<div class="ai-result-title">참조 메모 ${refs.length}개</div>`;refs.forEach(idx=>{const memo=all[idx];if(!memo)return;const item=document.createElement('div');item.className='ai-result-memo';item.innerHTML=`<div class="ai-result-memo-cat">${memo.category} · ${new Date(memo.createdAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'})}</div><div class="ai-result-memo-text">${esc((memo.text||'').slice(0,80))}${(memo.text||'').length>80?'…':''}</div>`;item.addEventListener('click',()=>showMemoModal(memo));rc.appendChild(item);});const wrap=document.querySelector('#chat-messages .msg.bot:last-child');if(wrap)wrap.appendChild(rc);document.getElementById('chat-messages').scrollTop=document.getElementById('chat-messages').scrollHeight;}
  } catch(err) { finalizeStream(bubble); bubble.innerHTML=`오류: ${esc(err.message)}`; }
}

async function extractAndApplyTags(memo, aiResponse) {
  const tagMatch = aiResponse.match(/"tags":\s*\[(.*?)\]/);
  if (tagMatch) {
    try {
      const tagsStr = '[' + tagMatch[1] + ']';
      const tags = JSON.parse(tagsStr);
      if (Array.isArray(tags)) {
        memo.tags = tags;
      }
    } catch(e) {}
  }
  return memo;
}

function renderTimeline() {
  const container = document.getElementById('timeline-container');
  if (!container) return;
  container.innerHTML = '';
  const allMemos = storage.getAll();
  if (!allMemos.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">메모가 없어요</div><div class="empty-sub">채팅 탭에서 메모를 입력해보세요</div></div>';
    return;
  }

  // date 있으면 date, 없으면 createdAt 날짜 부분 사용
  const getDateKey = m => m.date || (m.createdAt ? m.createdAt.slice(0, 10) : null);
  const getDisplayDate = key => {
    if (!key) return '날짜 없음';
    const d = new Date(key + 'T00:00:00');
    return isNaN(d) ? key : d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
  };

  // 날짜 기준 내림차순 정렬
  const sorted = [...allMemos].sort((a, b) => {
    const da = getDateKey(a) || '0000', db = getDateKey(b) || '0000';
    return db.localeCompare(da);
  });

  const catColors = { '일정':'var(--gem-accent)', '메모':'var(--c-blue)', '할일':'var(--c-green)', '기타':'var(--c-label3)' };

  let lastKey = null;
  let currentGroup = null;

  sorted.forEach(memo => {
    const key = getDateKey(memo);
    if (key !== lastKey) {
      lastKey = key;
      currentGroup = document.createElement('div');
      currentGroup.className = 'timeline-date-group';
      const header = document.createElement('div');
      header.className = 'timeline-date-header';
      header.textContent = getDisplayDate(key);
      currentGroup.appendChild(header);
      container.appendChild(currentGroup);
    }

    const item = document.createElement('div');
    item.className = 'timeline-item';

    const dot = document.createElement('div');
    dot.className = 'timeline-dot';
    dot.style.backgroundColor = catColors[memo.category] || 'var(--c-label3)';

    const content = document.createElement('div');
    content.className = 'timeline-content';
    content.style.borderLeftColor = catColors[memo.category] || 'var(--c-label3)';

    const title = memo.title || memo.text || '';
    const preview = (memo.text || '').slice(0, 60);
    content.innerHTML = `
      <div style="font-size:13px;font-weight:600;color:var(--c-label);margin-bottom:3px">${esc(title.slice(0, 40))}</div>
      ${preview && preview !== title ? `<div style="font-size:12px;color:var(--c-label3)">${esc(preview)}${memo.text?.length > 60 ? '…' : ''}</div>` : ''}
      ${memo.time ? `<div style="font-size:11px;color:var(--gem-accent);margin-top:3px">⏰ ${memo.time}</div>` : ''}
    `;
    content.style.cursor = 'pointer';
    content.addEventListener('click', () => showMemoModal(memo));

    item.appendChild(dot);
    item.appendChild(content);
    currentGroup.appendChild(item);
  });
}
